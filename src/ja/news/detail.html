<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ニュース詳細 | STEP</title>

    <!-- SEO（多言語） -->
    <link rel="alternate" hreflang="ja" href="/ja/">
    <link rel="alternate" hreflang="en" href="/en/">

    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>
    <header class="l-header">
        <div class="l-header__inner">
            <a href="/ja/" class="l-header__logo">STEP</a>
            <nav class="l-header__nav">
                <a href="/ja/news/">News</a>
                <a href="/en/detail.html">ENGLISH</a>
            </nav>
        </div>
    </header>

    <main class="l-main">
        <section class="p-news-list">
            <div class="p-news-list__inner">
                <p class="p-news-list__title">News</p>
                <article class="p-article">
                    <!-- <div class="p-article__inner"> -->
                    <time id="news-date" class="p-article__date"></time>
                    <h1 id="news-title" class="p-article__title"></h1>
                    <img id="news-thumbnail" class="p-article__thumbnail" alt="" loading="lazy">
                    <div id="news-body" class="p-article__body"></div>

                    <!-- </div> -->
                </article>
                <div class="p-news-list__btn">
                    <a href="/ja/news/" class="c-btn">一覧に戻る</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="l-footer">
        <p>© 2026 STEP</p>
    </footer>

    <script src="/assets/js/main.js"></script>
</body>

</html>
